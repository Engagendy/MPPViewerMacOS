name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build DMG (${{ matrix.arch }})
    runs-on: macos-15
    strategy:
      matrix:
        arch: [arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Maven
        run: brew install maven

      - name: Build & Package
        run: ./scripts/package.sh --arch ${{ matrix.arch }} --version ${{ steps.version.outputs.version }}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log-${{ matrix.arch }}
          path: build/xcodebuild.log
          if-no-files-found: ignore

      - name: Upload DMG artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: build/MPPViewer-*.dmg

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all DMG artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dmg-*
          merge-multiple: true

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s")
          fi
          cat > release_notes.md << 'HEADER'
          ## What's New

          HEADER
          echo "$NOTES" >> release_notes.md
          cat >> release_notes.md << 'FOOTER'

          ## Installation

          ### Direct Download
          1. Download the `.dmg` file for your Mac below
          2. Open the DMG and drag **MPP Viewer** to your Applications folder
          3. On first launch, right-click the app → **Open** → **Open** (required for unsigned apps)

          ### Homebrew
          ```
          brew install --cask mpp-viewer
          ```

          ### Gatekeeper Bypass
          If macOS blocks the app, run:
          ```
          xattr -cr /Applications/MPP\ Viewer.app
          ```
          FOOTER

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: artifacts/*.dmg
          draft: false
          prerelease: false

  update-homebrew:
    name: Update Homebrew Cask
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute SHA256
        id: sha
        run: |
          DMG_URL="https://github.com/Engagendy/MPPViewerMacOS/releases/download/${{ steps.version.outputs.tag }}/MPPViewer-${{ steps.version.outputs.version }}-arm64.dmg"
          echo "Waiting for release asset to be available..."
          for i in $(seq 1 30); do
            if curl -fsSL -o /tmp/mpp.dmg "$DMG_URL" 2>/dev/null; then
              echo "Downloaded DMG"
              break
            fi
            echo "Attempt $i: asset not ready, retrying in 10s..."
            sleep 10
          done
          if [ ! -f /tmp/mpp.dmg ]; then
            echo "ERROR: Could not download DMG after 30 attempts"
            exit 1
          fi
          SHA=$(sha256sum /tmp/mpp.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Engagendy/homebrew-tap
          ref: ${{ vars.HOMEBREW_TAP_BRANCH || 'main' }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          cat > homebrew-tap/Casks/mpp-viewer.rb << CASKEOF
          cask "mpp-viewer" do
            version "$VERSION"
            sha256 "$SHA"

            url "https://github.com/Engagendy/MPPViewerMacOS/releases/download/$TAG/MPPViewer-#{version}-arm64.dmg",
                verified: "github.com/Engagendy/MPPViewerMacOS/"

            name "MPP Viewer"
            desc "Native macOS viewer for Microsoft Project (.mpp) files"
            homepage "https://github.com/Engagendy/MPPViewerMacOS"

            depends_on macos: ">= :sonoma"

            app "MPPViewer.app"

            postflight do
              # Remove quarantine attributes recursively so the unsigned app
              # and its bundled JRE can launch without Gatekeeper blocking
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/MPPViewer.app"],
                             sudo: true
            end

            zap trash: [
              "~/Library/Caches/com.mppviewer.MPPViewer",
              "~/Library/Preferences/com.mppviewer.MPPViewer.plist",
              "~/Library/Saved Application State/com.mppviewer.MPPViewer.savedState",
            ]
          end
          CASKEOF

      - name: Commit and push cask update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/mpp-viewer.rb
          git commit -m "Update mpp-viewer to ${{ steps.version.outputs.version }}"
          git push
